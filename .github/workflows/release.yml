name: Release Vidnovagram

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        id: tauri
        uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: v__VERSION__
          releaseName: Vidnovagram v__VERSION__
          releaseBody: 'Нова версія Vidnovagram для Windows.'
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false

      - name: Generate and upload latest.json
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        run: |
          $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $tag = "v$version"
          $nsisExe = "src-tauri/target/release/bundle/nsis/Vidnovagram_${version}_x64-setup.exe"

          if (-not (Test-Path $nsisExe)) {
            Write-Host "NSIS exe not found, cannot generate updater"
            exit 0
          }

          # Create nsis.zip from exe (use 7z for compatible Deflate compression)
          $nsisZip = "src-tauri/target/release/bundle/nsis/Vidnovagram_${version}_x64-setup.nsis.zip"
          7z a -tzip -mx=5 $nsisZip $nsisExe
          Write-Host "Created nsis.zip: $((Get-Item $nsisZip).Length) bytes"

          # Sign the nsis.zip
          npx tauri signer sign $nsisZip
          $sigPath = "${nsisZip}.sig"

          if (-not (Test-Path $sigPath)) {
            Write-Host "Signing failed, no .sig file"
            exit 0
          }

          $sig = (Get-Content $sigPath -Raw).Trim()
          $pubDate = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ" -AsUTC)
          $releaseUrl = "https://github.com/${{ github.repository }}/releases/download/$tag"

          $json = @{
            version = $version
            notes = "Vidnovagram $tag"
            pub_date = $pubDate
            platforms = @{
              "windows-x86_64" = @{
                signature = $sig
                url = "$releaseUrl/Vidnovagram_${version}_x64-setup.nsis.zip"
              }
            }
          } | ConvertTo-Json -Depth 4

          $json | Out-File -FilePath latest.json -Encoding utf8NoBOM
          Write-Host "Generated latest.json:"
          Get-Content latest.json

          gh release upload $tag $nsisZip latest.json --clobber
          Write-Host "Uploaded latest.json + nsis.zip for $tag"
